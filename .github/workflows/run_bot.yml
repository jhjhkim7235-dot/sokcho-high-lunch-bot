name: Sokcho High School Lunch Bot

on:
  schedule:
    - cron: '0 13 * * 0-4'  # 한국 시간 일~목 밤 22:00 실행 (다음 날 급식 게시)
  workflow_dispatch:        # 언제든지 수동으로 즉시 실행 가능하게 설정

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pillow pytz instagrapi

    - name: Download Korean Font
      run: |
        wget -O NanumGothicBold.ttf https://github.com/google/fonts/raw/main/ofl/nanumgothic/NanumGothic-Bold.ttf

    - name: Run main script
      env:
        INSTAGRAM_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
        INSTAGRAM_PASSWORD: ${{ secrets.INSTAGRAM_PASSWORD }}
      run: |
        python main.py
