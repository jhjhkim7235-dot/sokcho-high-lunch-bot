name: Sokcho High School Lunch Bot

on:
  schedule:
    # 한국 시간 낮 12:00 = UTC 오전 3:00 (10분 여유를 두고 11시 50분 설정)
    - cron: '50 2 * * 1-5' 
  workflow_dispatch: # 언제든지 수동으로 실행 가능하게 설정

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pillow pytz instagrapi

    - name: Download Korean Font
      run: |
        wget -O NanumGothicBold.ttf https://github.com/google/fonts/raw/main/ofl/nanumgothic/NanumGothic-Bold.ttf

    - name: Run main script
      env:
        INSTAGRAM_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
        INSTAGRAM_PASSWORD: ${{ secrets.INSTAGRAM_PASSWORD }}
      run: |
        python main.py
