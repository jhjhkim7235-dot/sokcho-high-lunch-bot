name: 속초고 급식 봇 구동

on:
  schedule:
    # 한국 시간(KST) 매일 아침 7시 10분에 자동 실행 (UTC 22:10)
    - cron: '10 22 * * *'
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 코드 가져오기
      uses: actions/checkout@v4

    - name: 파이썬 설치
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 필수 패키지 설치
      run: |
        pip install requests pillow instagrapi pytz

    - name: 한글 폰트 다운로드
      run: |
        mkdir -p fonts
        wget -O fonts/NanumGothicBold.ttf "https://github.com/google/fonts/raw/main/ofl/nanumgothic/NanumGothic-Bold.ttf"

    - name: 메인 스크립트 실행
      env:
        # ⭐ 깃허브 Secrets에 모셔둔 값들을 파이썬 코드로 안전하게 토스해주는 핵심 연결고리입니다!
        NEIS_KEY: ${{ secrets.NEIS_KEY }}
        INSTA_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
        INSTA_PASSWORD: ${{ secrets.INSTAGRAM_PASSWORD }}
      run: python main.py
